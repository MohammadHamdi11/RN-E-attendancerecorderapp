name: Daily Attendance Processing
permissions:
  contents: write  # This grants push access to GITHUB_TOKEN

# When to run the automation
on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:      # Allow manual triggering for testing
  push:                   # Trigger on manual uploads
    branches:
      - main
    paths:  # Only trigger when attendance_reports folder changes
      - 'attendance_reports/**'

# Prevent concurrent runs, cancel running job when new one starts
concurrency:
  group: attendance-processing
  cancel-in-progress: true

jobs:
  process-attendance:
    runs-on: ubuntu-latest
    
    # Skip if the last commit was from the bot (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, 'Daily attendance processing') && !contains(github.event.head_commit.message, 'Log management')"
    
    steps:
    # Download all repository files and folders
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # Set Git identity so manage_logs.py and later steps can commit
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Attendance Bot"
      
    # Install Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    # Install required libraries from requirements.txt
    - name: Install dependencies
      run: pip install -r requirements.txt

    # STEP 1: Convert any leftover Excel files in log_history/ to .db
    - name: Convert Remnant Excel Files in log_history
      id: convert_remnant_excel
      if: steps.merge_sessions.outcome == 'success'  # Only run if session merging succeeded
      run: |
        echo "Checking for remnant Excel files in log_history/..."
        shopt -s nullglob
        excel_files=(log_history/Y*.xlsx log_history/Y*.xls)
        if [ ${#excel_files[@]} -eq 0 ]; then
          echo "No remnant Excel files found in log_history/ -- skipping conversion"
          exit 0
        fi
        echo "Found ${#excel_files[@]} Excel file(s) -- converting to .db..."

        python excel_to_db_github.py \
          --headless \
          --excel-dir  log_history \
          --lookup     userID-email.xlsx \
          --output-dir log_history

        # Clean up: read the manifest written by excel_to_db_github.py and delete
        # only the Excel files that were individually confirmed as converted.
        # Files that failed (bad data, missing columns, etc.) are left in place
        # so the next run can retry them. Other Excel files in the folder are
        # never touched regardless.
        manifest="log_history/.converted_manifest.txt"
        cleaned=0
        kept=0
        if [ -f "$manifest" ]; then
          while IFS= read -r xl_path; do
            [ -z "$xl_path" ] && continue
            if [ -f "$xl_path" ]; then
              rm -f "$xl_path"
              echo "  Cleaned up: $(basename $xl_path)"
              cleaned=$((cleaned + 1))
            fi
          done < "$manifest"
          rm -f "$manifest"  # remove manifest itself after processing
        else
          echo "  No manifest found -- no files cleaned up"
        fi

        # Report files that were found but not in the manifest (i.e. failed)
        shopt -s nullglob
        remaining=(log_history/Y*.xlsx log_history/Y*.xls)
        kept=${#remaining[@]}
        [ $kept -gt 0 ] && echo "  Kept for retry (not converted): ${remaining[*]##*/}"

        echo "Cleanup: removed $cleaned file(s), kept $kept for retry"
        echo "Conversion step done"
        exit 0  # Always exit 0 -- manage_logs must run regardless
      continue-on-error: true  # Non-fatal: pipeline always continues to manage_logs
      
    # STEP 2: Merge user sessions (runs first)
    - name: Merge User Sessions
      id: merge_sessions
      run: |
        echo "Starting user session merging..."
        python merge_user_sessions.py
        echo "User session merging completed"
      continue-on-error: false  # Stop workflow if this fails

    # STEP 3: Manage log databases (runs after session merging, regardless of conversion outcome)
    - name: Manage Log Databases
      id: manage_logs
      if: steps.merge_sessions.outcome == 'success'  # Gate on merge_sessions, not conversion (conversion is best-effort)
      run: |
        echo "Starting log management..."
        python manage_logs.py
        echo "Log management completed"
      continue-on-error: false  # Stop workflow if this fails
    
    # STEP 4: Export attendance data to Excel (runs after log management)
    - name: Export Attendance to Excel
      id: export_to_excel
      if: steps.manage_logs.outcome == 'success'  # Only run if log management succeeded
      run: |
        echo "Starting database to Excel export..."
        python db_to_excel.py
        echo "Excel export completed"
      continue-on-error: true  # Continue even if export fails
    
    # STEP 5: Run attendance processing (runs after Excel export)
    - name: Run Attendance Processing
      id: process_attendance
      if: steps.manage_logs.outcome == 'success'  # Only run if log management succeeded
      run: |
        echo "Starting attendance processing..."
        python attendance_automation.py
        echo "Attendance processing completed"
        
    # STEP 6: Commit and push results with retry logic
    - name: Commit and push results
      if: steps.merge_sessions.outcome == 'success' || steps.convert_remnant_excel.outcome == 'success' || steps.manage_logs.outcome == 'success' || steps.export_to_excel.outcome == 'success' || steps.process_attendance.outcome == 'success'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Attendance Bot"
        
        # Pull first to get any changes made during workflow run
        git pull --rebase origin main || echo "No remote changes to pull"
        
        git add .
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        # Create commit message with timestamp
        commit_msg="Daily attendance processing - $(date '+%Y-%m-%d %H:%M:%S UTC' -u)"
        
        git commit -m "$commit_msg"
        
        # Retry logic with exponential backoff
        max_attempts=5
        attempt=1
        while [ $attempt -le $max_attempts ]; do
          echo "Push attempt $attempt of $max_attempts"
          
          if git push; then
            echo "Push successful"
            exit 0
          fi
          
          echo "Push failed, pulling and retrying..."
          git pull --rebase origin main
          
          if [ $attempt -eq $max_attempts ]; then
            echo "Max attempts reached, failing"
            exit 1
          fi
          
          sleep $((2 ** attempt))  # Exponential backoff: 2s, 4s, 8s, 16s
          attempt=$((attempt + 1))
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # Optional: Summary of what was done
    - name: Workflow Summary
      if: always()  # Run even if previous steps failed
      run: |
        echo "=== Workflow Summary ==="
        echo "Merge Sessions:           ${{ steps.merge_sessions.outcome }}"
        echo "Convert Remnant Excel:    ${{ steps.convert_remnant_excel.outcome }}"
        echo "Log Management:           ${{ steps.manage_logs.outcome }}"
        echo "Excel Export:             ${{ steps.export_to_excel.outcome }}"
        echo "Attendance Processing:    ${{ steps.process_attendance.outcome }}"
        echo "======================="
